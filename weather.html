<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <style>
    #map { height: 300px; width: 100%; }
  </style>
</head>
<body class="bg-gray-100 text-gray-900"  style="background-image: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb');">

  <!-- Header -->
  <header class="flex fixed top-0 justify-between items-center bg-gray-200 shadow-lg w-full">
    <div class="m-4">
        <img src="./image/a87020df-7af7-40d8-aba1-61c7819f1e46.jpg" height="40px"
            width="40px" class="rounded-full">
    </div>
    <nav class="flex gap-4 text-black items-center pr-12">
        <a href="main.html" class="text-black text-sm hover:text-green-500">Home</a>
        <a href="map.html" class="text-black text-sm hover:text-green-500">Map</a>
        <a href="./leader.html" class="text-black text-sm hover:text-green-500">Experts</a>
        <a href="contact.html" class="text-black text-sm hover:text-green-500">Contact</a>
    </nav>
</header>

  <section class="bg-cover mt-20 bg-center h-[450px]" style="background-image: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb');">
    <div class="bg-black bg-opacity-50 h-[450px]">
      <div class="container mx-auto p-6 flex flex-col lg:flex-row gap-10">
        <div class="lg:w-1/3">
          <div class="flex justify-center mb-4">
            <input id="locationInput" type="text" placeholder="Enter a city name"
              class="p-2 border border-gray-300 rounded-l-lg w-2/3 focus:outline-none" />
            <button onclick="searchLocation()" class="bg-blue-600 text-white px-4 rounded-r-lg hover:bg-blue-700">
              Search
            </button>
          </div>

          <div id="map" class="rounded-lg shadow-lg"></div>
        </div>

        <div id="weather" class="bg-white/20 p-6 lg:w-2/3 rounded-lg shadow-xl text-center">
          <h2 class="text-xl font-semibold mb-4">Weather Information</h2>
          <p class="text-gray-700 font-medium">
            Click on the map or search a city to see weather details.
          </p>
        </div>
      </div>
    </div>
  </section>

  <footer class="bg-blue-600 text-white text-center py-4 shadow-inner">
    &copy; 2025 Weather Service
  </footer>

  <script>
    const map = L.map('map').setView([20, 0], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    async function getWeather(lat, lon) {
      const apiKey = '156d9e29e84dfcd1f8472d9e8fee3031'; 
      const url = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${apiKey}&units=metric`;
      const response = await fetch(url);
      const data = await response.json();
      document.getElementById('weather').innerHTML = `
        <h2 class="text-2xl text-white font-bold mb-2">${data.name}</h2>
        <p class="text-lg text-white">🌡️ Temp: <strong>${data.main.temp}°C</strong></p>
        <p class="text-lg text-white">🌤️ Condition: <strong>${data.weather[0].description}</strong></p>
        <p class="text-lg text-white">💧 Humidity: <strong>${data.main.humidity}%</strong></p>
        <p class="text-lg text-white">🌬️ Wind: <strong>${data.wind.speed} m/s</strong></p>
      `;
    }

    map.on('click', function (e) {
      const { lat, lng } = e.latlng;
      getWeather(lat, lng);
    });

    async function searchLocation() {
      const city = document.getElementById('locationInput').value;
      if (!city) return;
      const apiKey = '156d9e29e84dfcd1f8472d9e8fee3031';
      const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`;
      const response = await fetch(url);
      const data = await response.json();
      if (data.coord) {
        map.setView([data.coord.lat, data.coord.lon], 10);
        getWeather(data.coord.lat, data.coord.lon);
      } else {
        document.getElementById('weather').innerHTML = '<p class="text-red-500 font-bold">Location not found.</p>';
      }
    }
  </script>
</body>
</html>
