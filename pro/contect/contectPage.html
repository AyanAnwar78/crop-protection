<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Document</title>
</head>

<body>
    <div class="bg-blue-200/70 flex h-screen gap-20">
        <div class="max-w-3xl w-full text-center p-6 mt-20 ml-14">
            <h1 class="text-7xl text-gray-900 mt-10">Get in touch with us</h1>
            <p class="text-gray-700 text-xl text-left mt-20 ml-14">
                Have a question or need assistance? We’re here to help. Whether you have general inquiries about our
                insurance plans or need to address a specific concern, our team is ready to assist you.
            </p>

            <div class="mt-20 ml-14 w-96">
                <!-- Kshema Products Enquiry -->
                <div class="p-6 rounded-lg shadow-md">
                    <h2 class="text-2xl font-semibold text-gray-900">Kshema Products Enquiry</h2>
                    <div class="mt-4 flex items-center space-x-2">
                        <span class="text-blue-500">📞</span>
                        <p class="text-gray-700 text-xl">1800 572 3013 (toll-free)</p>
                    </div>
                    <div class="mt-2 flex items-center space-x-2">
                        <span class="text-blue-500">📧</span>
                        <p class="text-gray-700 text-xl">customer.support@kshema.co</p>
                    </div>
                </div>
            </div>
        </div>

        <div>
            <section id="forum" class="bg-white m-12 mt-36 p-6 rounded-lg shadow-md">

                <div class="w-[500px] mx-auto p-4 rounded-lg">
                    <!-- Input Fields -->
                    <div class="space-y-4">
                        <div class="flex gap-4">
                            <label class="flex-1">
                                First Name:
                                <input type="text" id="firstName" class="border w-full p-2 rounded-lg"
                                    placeholder="John">
                            </label>
                            <label class="flex-1">
                                Last Name:
                                <input type="text" id="lastName" class="border w-full p-2 rounded-lg" placeholder="Doe">
                            </label>
                        </div>
                        <label>
                            Email:
                            <input type="text" id="email" class="border w-full p-2 rounded-lg"
                                placeholder="xyz@gmail.com">
                        </label>
                        <label>
                            Address:
                            <input type="text" id="address" class="border w-full p-2 rounded-lg"
                                placeholder="123 Main St, City, Country">
                        </label>
                        <label>
                            Message:
                            <textarea id="forumInput" placeholder="Write your message here..."
                                class="w-full border p-2 rounded-lg"></textarea>
                        </label>
                    </div>

                    <!-- Post Button -->
                    <button onclick="postForumMessage()"
                        class="bg-green-500 text-white px-4 py-2 mt-2 rounded-lg hover:bg-green-700 w-full">
                        Submit
                    </button>
                </div>
            </section>
        </div>
    </div>

</body>

</html>
